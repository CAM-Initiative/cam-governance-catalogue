<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>CAM Governance Problem Explorer</title><link rel="stylesheet" href="assets/style.css" /></head>
  <body data-page="explorer">
    <a class="skip-link" href="#explorer-main">Skip to explorer</a>
    <header class="site-header"><p class="eyebrow">CAM Runtime Atlas</p><h1>Governance Problem Explorer</h1><nav class="top-nav"><a href="index.html">Home</a><a href="runtime.html">Runtime Flow</a></nav></header>
    <main id="explorer-main" class="container">
      <section class="panel"><h2>Interpretive navigation layer — not canonical text.</h2><p id="pathway-error" class="error" hidden></p><div id="pathway-list" class="pathway-grid"></div></section>
      <section class="panel"><div id="data-warnings"></div></section>
      <section class="panel" id="browse"><h2>Browse instruments</h2>
        <label for="search-input" class="field-label">Search instrument metadata</label>
        <input id="search-input" type="search" placeholder="Search id, title, summary, purpose, domain, instrument class, hierarchy, status, effect" />
        <div class="filter-grid">
          <div><label for="filter-domain" class="field-label">Domain</label><select id="filter-domain"><option value="">All</option></select></div>
          <div><label for="filter-instrument-class" class="field-label">Instrument class</label><select id="filter-instrument-class"><option value="">All</option></select></div>
          <div><label for="filter-hierarchy-type" class="field-label">Hierarchy type</label><select id="filter-hierarchy-type"><option value="">All</option></select></div>
          <div><label for="filter-status" class="field-label">Status</label><select id="filter-status"><option value="">All</option></select></div>
          <div><label for="filter-effect" class="field-label">Effect</label><select id="filter-effect"><option value="">All</option></select></div>
          <div><label for="filter-enforcement" class="field-label">Enforcement</label><select id="filter-enforcement"><option value="">All</option></select></div>
          <div><label for="filter-review-state" class="field-label">Review state</label><select id="filter-review-state"><option value="">All</option></select></div>
          <div><label for="filter-authority-role" class="field-label">Authority role</label><select id="filter-authority-role"><option value="">All</option></select></div>
        </div>
        <p id="result-count">Loading data…</p>
        <section id="results" class="results"></section>
      </section>
    </main>
    <script src="assets/app.js" defer></script>
    <script src="assets/runtime-map.js" defer></script>
  </body>
</html>
