<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">CAM Runtime Flow Diagram</title>
  <desc id="desc">A calm, architectural runtime flow diagram showing Start-Time Posture, Signal Detection, Arbitration, Execution Lock, Runtime Execution, Output, and Memory Loop.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ea"/>
      <stop offset="48%" stop-color="#f2efe7"/>
      <stop offset="100%" stop-color="#e9eef2"/>
    </linearGradient>

    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b98a2f"/>
      <stop offset="55%" stop-color="#d7b46a"/>
      <stop offset="100%" stop-color="#a87322"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#b18a3d" flood-opacity="0.16"/>
    </filter>

    <marker id="arrowGold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b98a2f" opacity="0.78"/>
    </marker>

    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 26px; letter-spacing: 0.08em; fill: #4b4031; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 11px; letter-spacing: 0.14em; fill: #7d7468; text-transform: uppercase; }
      .nodeText { font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #42392e; text-anchor: middle; }
      .nodeSub { font-family: Inter, Arial, sans-serif; font-size: 10px; letter-spacing: 0.08em; fill: #8b8172; text-anchor: middle; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 10px; letter-spacing: 0.1em; fill: #978c7d; text-anchor: middle; }
      .node { fill: rgba(255,255,255,0.46); stroke: url(#goldStroke); stroke-width: 1.4; filter: url(#softShadow); }
      .connector { fill: none; stroke: #b98a2f; stroke-width: 1.35; opacity: 0.68; marker-end: url(#arrowGold); }
      .fine { fill: none; stroke: #c7b58d; stroke-width: 0.8; opacity: 0.22; }
      .faint { fill: none; stroke: #9fb2bd; stroke-width: 0.7; opacity: 0.18; }
      .dot { fill: #b98a2f; opacity: 0.42; }
    </style>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- faint architectural linework -->
  <g id="background-linework">
    <path class="fine" d="M60 390 C170 330, 220 335, 335 270 S535 145, 690 210 S920 330, 1090 255 S1310 140, 1440 190"/>
    <path class="faint" d="M95 110 L225 210 L150 345 L310 410 L455 315 L610 360 L760 275 L905 330 L1060 245 L1215 300 L1375 220"/>
    <path class="fine" d="M88 404 L180 320 L260 360 L375 285 L485 305 L612 225 L742 245 L875 185 L990 230 L1120 160 L1265 210 L1410 150"/>
    <circle class="fine" cx="192" cy="320" r="48"/>
    <circle class="fine" cx="1232" cy="209" r="58"/>
    <path class="fine" d="M1184 209 L1232 151 L1280 209 L1232 267 Z"/>
    <path class="fine" d="M148 345 L225 210 L310 410"/>
    <path class="faint" d="M1110 420 H1428"/>
    <path class="faint" d="M1160 440 H1388"/>
    <circle class="dot" cx="95" cy="110" r="3"/>
    <circle class="dot" cx="225" cy="210" r="3"/>
    <circle class="dot" cx="310" cy="410" r="3"/>
    <circle class="dot" cx="905" cy="330" r="3"/>
    <circle class="dot" cx="1232" cy="151" r="3"/>
    <circle class="dot" cx="1410" cy="150" r="3"/>
  </g>

  <!-- header -->
  <g id="diagram-heading">
    <text x="92" y="82" class="title">CAM Runtime Flow</text>
    <text x="94" y="110" class="subtitle">start-time posture · arbitration · execution lock · output integrity</text>
  </g>

  <!-- main flow connectors -->
  <g id="flow-connectors">
    <path class="connector" d="M260 250 H340"/>
    <path class="connector" d="M460 250 H540"/>
    <path class="connector" d="M660 250 H740"/>
    <path class="connector" d="M860 250 H940"/>
    <path class="connector" d="M1060 250 H1140"/>
    <path class="connector" d="M1260 250 H1340"/>
    <path class="connector" d="M1395 214 C1375 105, 1105 80, 730 105 C500 122, 430 158, 402 214" />
  </g>

  <!-- nodes -->
  <g id="start-time-posture" class="runtime-node" data-node="start-time-posture">
    <rect class="node" x="120" y="214" width="140" height="72" rx="20"/>
    <text class="nodeText" x="190" y="245">Start-Time</text>
    <text class="nodeText" x="190" y="264">Posture</text>
    <text class="nodeSub" x="190" y="303">ENTRY</text>
  </g>

  <g id="signal-detection" class="runtime-node" data-node="signal-detection">
    <rect class="node" x="340" y="214" width="120" height="72" rx="20"/>
    <text class="nodeText" x="400" y="245">Signal</text>
    <text class="nodeText" x="400" y="264">Detection</text>
    <text class="nodeSub" x="400" y="303">CLASSIFY</text>
  </g>

  <g id="arbitration" class="runtime-node" data-node="arbitration">
    <rect class="node" x="540" y="214" width="120" height="72" rx="20"/>
    <text class="nodeText" x="600" y="255">Arbitration</text>
    <text class="nodeSub" x="600" y="303">RESOLVE</text>
  </g>

  <g id="execution-lock" class="runtime-node" data-node="execution-lock">
    <rect class="node" x="740" y="214" width="120" height="72" rx="20"/>
    <text class="nodeText" x="800" y="245">Execution</text>
    <text class="nodeText" x="800" y="264">Lock</text>
    <text class="nodeSub" x="800" y="303">COMMIT</text>
  </g>

  <g id="runtime-execution" class="runtime-node" data-node="runtime-execution">
    <rect class="node" x="940" y="214" width="120" height="72" rx="20"/>
    <text class="nodeText" x="1000" y="245">Runtime</text>
    <text class="nodeText" x="1000" y="264">Execution</text>
    <text class="nodeSub" x="1000" y="303">TENDEKA</text>
  </g>

  <g id="output" class="runtime-node" data-node="output">
    <rect class="node" x="1140" y="214" width="120" height="72" rx="20"/>
    <text class="nodeText" x="1200" y="255">Output</text>
    <text class="nodeSub" x="1200" y="303">EXPRESS</text>
  </g>

  <g id="memory-loop" class="runtime-node" data-node="memory-loop">
    <rect class="node" x="1340" y="214" width="120" height="72" rx="20"/>
    <text class="nodeText" x="1400" y="245">Memory</text>
    <text class="nodeText" x="1400" y="264">Loop</text>
    <text class="nodeSub" x="1400" y="303">FEEDBACK</text>
  </g>

  <!-- subtle boundary annotations -->
  <g id="boundary-annotations">
    <path class="fine" d="M705 170 V335"/>
    <text x="705" y="354" class="label">SELECT → LOCK BOUNDARY</text>

    <path class="fine" d="M885 170 V335"/>
    <text x="885" y="354" class="label">POST-LOCK EXECUTION</text>
  </g>

  <!-- right aligned sigil echo -->
  <g id="aeon-sigil-echo" opacity="0.36" transform="translate(1260 58)">
    <circle cx="80" cy="80" r="63" class="fine"/>
    <path class="fine" d="M80 20 L132 110 H28 Z"/>
    <path class="fine" d="M28 50 H132 L80 142 Z"/>
    <path class="fine" d="M35 80 H125"/>
    <path class="fine" d="M80 20 V142"/>
  </g>

  <!-- footer metadata -->
  <g id="footer">
    <text x="94" y="448" class="subtitle">AEON Governance Lab · canonical visual layer · repo-ready SVG</text>
  </g>
</svg>
