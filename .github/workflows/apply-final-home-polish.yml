name: Apply final homepage polish

on:
  push:
    branches:
      - fix/header-logo-render
    paths:
      - ".github/workflows/apply-final-home-polish.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source edits
        run: |
          python - <<'PY'
          from pathlib import Path

          shell = Path("src/components/layout/Shell.tsx")
          text = shell.read_text()
          old = "Governance infrastructure for artificial intelligence, synthetic agents, and runtime governance systems"
          new = "Governance architecture, evidence-led repair, and public policy for artificial intelligence and synthetic agents."
          if old not in text:
              raise SystemExit("Expected footer statement was not found")
          shell.write_text(text.replace(old, new, 1))

          polish = Path("src/polish.css")
          css = polish.read_text()
          marker = "/* Keep all six VIGIL evidence-to-repair cards aligned. */"
          block = '''

/* Keep all six VIGIL evidence-to-repair cards aligned. */
section[aria-labelledby="evidence-repair-heading"] > .overflow-x-auto article {
  height: 13.5rem;
  min-height: 13.5rem;
}

section[aria-labelledby="evidence-repair-heading"] > .overflow-x-auto article + div[aria-hidden="true"] {
  height: 13.5rem;
}
'''
          if marker not in css:
              polish.write_text(css.rstrip() + block)
          PY

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild Pages output
        run: |
          rm -rf docs/assets
          pnpm exec vite build
          node scripts/prepare-github-pages.js
          python scripts/validate-docs-published-output.py --base HEAD~1

      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/apply-final-home-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/layout/Shell.tsx src/polish.css docs .github/workflows/apply-final-home-polish.yml
          git commit -m "polish VIGIL cards and footer copy"
          git push
