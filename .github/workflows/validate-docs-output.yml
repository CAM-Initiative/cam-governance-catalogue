name: Validate published docs output

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-docs-output:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate /docs publication output
        run: python scripts/validate-docs-published-output.py
        env:
          DOCS_VALIDATION_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
