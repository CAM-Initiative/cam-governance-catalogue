name: Rebuild GitHub Pages output

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "scripts/prepare-github-pages.js"
      - ".github/workflows/publish-pages-output.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-output-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply requested homepage polish
        run: |
          python - <<'PY'
          from pathlib import Path

          shell = Path("src/components/layout/Shell.tsx")
          text = shell.read_text()
          old = "Governance infrastructure for artificial intelligence, synthetic agents, and runtime governance systems"
          new = "Governance architecture, evidence-led repair, and public policy for artificial intelligence and synthetic agents."
          if old not in text:
              raise SystemExit("Expected footer statement was not found")
          shell.write_text(text.replace(old, new, 1))

          polish = Path("src/polish.css")
          css = polish.read_text()
          marker = "/* Keep all six VIGIL evidence-to-repair cards aligned. */"
          block = '''

/* Keep all six VIGIL evidence-to-repair cards aligned. */
section[aria-labelledby="evidence-repair-heading"] > .overflow-x-auto article {
  height: 13.5rem;
  min-height: 13.5rem;
}

section[aria-labelledby="evidence-repair-heading"] > .overflow-x-auto article + div[aria-hidden="true"] {
  height: 13.5rem;
}
'''
          if marker not in css:
              polish.write_text(css.rstrip() + block)

          Path(".github/workflows/apply-final-home-polish.yml").unlink(missing_ok=True)
          PY

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild published site
        run: |
          rm -rf docs/assets
          pnpm exec vite build
          node scripts/prepare-github-pages.js

      - name: Validate generated Pages output
        run: python scripts/validate-docs-published-output.py --base HEAD~1

      - name: Restore permanent workflow and commit
        run: |
          git checkout HEAD^ -- .github/workflows/publish-pages-output.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/layout/Shell.tsx src/polish.css docs .github/workflows
          git commit -m "polish VIGIL cards and footer copy"
          git push
