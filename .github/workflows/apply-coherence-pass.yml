name: Apply website coherence pass

on:
  push:
    branches:
      - feature/policy-papers
    paths:
      - .github/workflows/apply-coherence-pass.yml

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4

      - name: Reposition Transitional Architecture tagline
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/pages/transition-authority.tsx")
          source = path.read_text()
          before = '''          <hr className="gold-rule mb-4 w-24" />
          <p className="max-w-4xl text-base font-light leading-relaxed text-muted-foreground md:text-lg">Governance for the thresholds where a capability stops being merely experimental or optional and begins reorganising products, institutions, labour, infrastructure, identity, ownership, public dependency and civilisational continuity.</p>
          <p className="mt-4 font-mono text-sm font-semibold uppercase tracking-[.18em] text-cam-gold">Classify the transition. Preserve recoverability. Prevent capture.</p>'''
          after = '''          <hr className="gold-rule mb-4 w-24" />
          <p className="mb-5 font-mono text-sm font-semibold uppercase tracking-[.18em] text-cam-gold">Classify the transition. Preserve recoverability. Prevent capture.</p>
          <p className="max-w-4xl text-base font-light leading-relaxed text-muted-foreground md:text-lg">Governance for the thresholds where a capability stops being merely experimental or optional and begins reorganising products, institutions, labour, infrastructure, identity, ownership, public dependency and civilisational continuity.</p>'''

          if source.count(before) != 1:
              raise SystemExit("Expected Transitional Architecture header block was not found exactly once")

          path.write_text(source.replace(before, after))
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check source
        run: pnpm exec tsc --noEmit

      - name: Build GitHub Pages output
        run: |
          rm -rf docs/assets
          pnpm exec vite build
          node scripts/prepare-github-pages.js

      - name: Remove temporary workflow
        run: rm -f .github/workflows/apply-coherence-pass.yml

      - name: Commit validated website update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refine policy and evidence-to-repair presentation"
          git push
