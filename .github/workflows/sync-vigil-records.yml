name: Sync VIGIL records

on:
  push:
    branches:
      - feature/explore-ai-governance-and-constitutional-stack
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CAM interface for GitHub Pages
        run: pnpm run deploy:docs

      - name: Validate catalogue data
        run: pnpm run validate:catalogue

      - name: Validate VIGIL registry sources
        run: pnpm run validate:vigil

      - name: Test VIGIL observatory
        run: pnpm run test:vigil

      - name: Restore canonical workflow and commit generated files
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/sync-vigil-records.yml

          if [ -z "$(git status --porcelain -- docs .github/workflows/sync-vigil-records.yml)" ]; then
            echo "No generated or workflow restoration changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs .github/workflows/sync-vigil-records.yml
          git commit -m "Rebuild site after homepage and stack refinement"
          git push
