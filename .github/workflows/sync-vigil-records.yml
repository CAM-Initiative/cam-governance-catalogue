name: Sync VIGIL records

on:
  workflow_dispatch:
  repository_dispatch:
    types: [vigil-records-updated]
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync VIGIL records
        run: pnpm run sync:vigil

      - name: Build CAM interface
        run: pnpm run build

      - name: Commit changed generated files
        run: |
          if [ -z "$(git status --porcelain -- docs)" ]; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: sync VIGIL registry"
          git push
