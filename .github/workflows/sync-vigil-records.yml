name: Sync VIGIL records

on:
  push:
    branches:
      - feature/explore-ai-governance-and-constitutional-stack
    paths:
      - .github/polish-constitutional-interfaces.trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: feature/explore-ai-governance-and-constitutional-stack
          fetch-depth: 0

      - name: Apply constitutional interface polish
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/pages/constitution.tsx")
          text = path.read_text()
          old = '<span className="block font-serif text-base leading-tight sm:text-xl">{layer.label}</span>'
          new = '''<span
                          className="block font-serif text-base leading-tight sm:text-xl"
                          style={{ transform: index === 0 ? "translateY(9px)" : undefined }}
                        >
                          {layer.label}
                        </span>'''
          assert old in text, "Constitution apex label marker not found"
          path.write_text(text.replace(old, new, 1))

          path = Path("src/pages/relational-governance.tsx")
          text = path.read_text()
          text = text.replace(
              'import { ArrowRight, Check, ShieldCheck } from "lucide-react";',
              'import { ArrowRight, Check, ChevronRight, ShieldCheck } from "lucide-react";',
              1,
          )

          state_start = text.index('          <div className="border-b border-border/70 px-5 py-7 md:px-8">', text.index("Relational Runtime Model"))
          runtime_start = text.index('          <div className="px-5 py-7 md:px-8 md:py-9">', state_start)
          new_state = '''          <div className="border-b border-border/70 px-5 py-7 md:px-8">
            <div className="mb-4 flex items-center gap-3"><p className="shrink-0 font-mono text-xs font-semibold uppercase tracking-[0.18em] text-cam-gold">Relational state architecture</p><hr className="gold-rule flex-1" /><span className="hidden font-mono text-[10px] uppercase tracking-[0.12em] text-foreground/45 sm:block">states + transition zones</span></div>
            <div className="-mx-5 overflow-x-auto px-5 pb-2 md:-mx-8 md:px-8">
              <div className="flex min-w-[1250px] items-center">
                {stateArchitecture.map((state, index) => (
                  <div className="flex items-center" key={state.code}>
                    <div className={`flex h-[148px] w-[174px] flex-col rounded-2xl border p-4 ${state.type === "zone" ? "border-dashed border-cam-gold/55 bg-[rgba(184,147,90,0.07)]" : "border-border/80 bg-card/85"}`}>
                      <span className="font-mono text-[10px] font-semibold uppercase tracking-[0.13em] text-cam-gold">{state.code}</span>
                      <span className="mt-4 flex min-h-[46px] items-center font-serif text-lg leading-tight text-foreground">{state.label}</span>
                      <span className="mt-auto min-h-[32px] text-xs leading-snug text-foreground/55">{state.note}</span>
                    </div>
                    {index < stateArchitecture.length - 1 && <div className="flex w-8 items-center justify-center" aria-hidden="true"><ArrowRight className="h-4 w-4 text-cam-gold/60" /></div>}
                  </div>
                ))}
              </div>
            </div>
          </div>

'''
          text = text[:state_start] + new_state + text[runtime_start:]

          runtime_start = text.index('          <div className="px-5 py-7 md:px-8 md:py-9">', text.index("Relational Runtime Model"))
          section_end = text.index('        </section>', runtime_start)
          new_runtime = '''          <div className="px-5 py-7 md:px-8 md:py-9">
            <div className="mb-4 flex items-center gap-3"><p className="shrink-0 font-mono text-xs font-semibold uppercase tracking-[0.18em] text-cam-gold">Runtime flow</p><hr className="gold-rule flex-1" /><span className="hidden font-mono text-[10px] uppercase tracking-[0.12em] text-foreground/45 sm:block">select a phase</span></div>
            <div className="-mx-5 overflow-x-auto px-5 pb-4 md:-mx-8 md:px-8">
              <div className="flex min-w-[2250px] items-start">
                {runtimePhases.map((phase, index) => {
                  const isActive = phase.id === activePhase.id;
                  const phaseOverride = activeRoute.phases[index];
                  const phaseState = phaseOverride?.state || phase.summary;
                  return (
                    <div className="flex items-start" key={phase.id}>
                      <motion.article
                        animate={{ opacity: 1, y: 0 }}
                        className="cam-parchment-card flex shrink-0 flex-col overflow-hidden rounded-2xl border transition-colors duration-200"
                        initial={{ opacity: 0, y: 10 }}
                        layout
                        style={{
                          width: isActive ? 560 : 240,
                          minHeight: 320,
                          borderColor: isActive ? GOLD : GOLD_BORDER,
                          boxShadow: isActive ? `0 4px 24px rgba(184,147,90,0.15), 0 0 0 1px ${GOLD_BORDER}` : "0 1px 4px rgba(120,80,20,0.07)",
                        }}
                        transition={{ duration: 0.32, delay: index * 0.035 }}
                      >
                        <button
                          aria-expanded={isActive}
                          className={`flex w-full flex-col p-5 text-left focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-ring ${isActive ? "min-h-[220px]" : "h-[320px]"}`}
                          onClick={() => setActivePhaseId(phase.id)}
                          type="button"
                        >
                          <span className="mb-5 flex items-start justify-between gap-3">
                            <span className="font-mono text-[10px] font-semibold uppercase tracking-[0.14em] text-cam-gold">{phaseOverride?.sublabel || phase.sublabel}</span>
                            <span className="flex h-7 w-7 shrink-0 items-center justify-center rounded-full border border-cam-gold/35 bg-[rgba(184,147,90,0.08)]">
                              <ChevronRight className="h-3.5 w-3.5 text-cam-gold transition-transform" style={{ transform: isActive ? "rotate(90deg)" : "rotate(0deg)" }} />
                            </span>
                          </span>
                          <span className="mb-5 flex h-9 w-9 items-center justify-center rounded-full border border-cam-gold/45 bg-[rgba(184,147,90,0.10)] font-mono text-[11px] font-semibold text-[hsl(32_62%_25%)]">{phase.step}</span>
                          <span className="min-h-[58px] font-serif text-2xl leading-tight text-foreground">{phase.label}</span>
                          {!isActive && <span className="mt-4 text-sm leading-relaxed text-foreground/60">{phaseState}</span>}
                        </button>

                        <AnimatePresence initial={false}>
                          {isActive && (
                            <motion.div animate={{ opacity: 1, height: "auto" }} className="flex-1 overflow-hidden" exit={{ opacity: 0, height: 0 }} initial={{ opacity: 0, height: 0 }} transition={{ duration: 0.22 }}>
                              <div className="border-t border-cam-gold/25 px-5 pb-5 pt-5">
                                {activeDetail.state && <p className="mb-4 rounded-xl border border-cam-gold/25 bg-[rgba(184,147,90,0.07)] px-4 py-3 font-mono text-[11px] font-semibold uppercase tracking-[0.12em] text-foreground/65">{activeDetail.state}</p>}
                                <p className="text-base leading-relaxed text-foreground/80">{activeDetail.detail}</p>
                                {activeDetail.output && <blockquote className="mt-5 border-l-2 border-cam-gold/70 pl-4 font-serif text-xl leading-relaxed text-foreground">{activeDetail.output}</blockquote>}

                                <div className="mt-6 grid gap-4 sm:grid-cols-2">
                                  <div className="rounded-xl border border-border/70 bg-background/55 p-4">
                                    <div className="mb-3 flex items-center gap-2"><ShieldCheck className="h-4 w-4 text-cam-gold" aria-hidden="true" /><p className="font-mono text-[10px] font-semibold uppercase tracking-[0.16em] text-cam-gold">Runtime checks</p></div>
                                    <ul className="grid gap-2.5">{activePhase.checks.map((item) => <li className="flex gap-2 text-sm leading-relaxed text-foreground/70" key={item}><Check className="mt-0.5 h-3.5 w-3.5 shrink-0 text-cam-gold" aria-hidden="true" /><span>{item}</span></li>)}</ul>
                                  </div>
                                  <div className="rounded-xl border border-border/70 bg-background/55 p-4"><p className="mb-2 font-mono text-[10px] font-semibold uppercase tracking-[0.16em] text-cam-gold">What this prevents</p><p className="text-sm leading-relaxed text-foreground/70">{activePhase.prevents}</p></div>
                                </div>
                              </div>
                              <div className="border-t border-border/70 bg-[hsl(38_40%_94%)] p-5"><p className="mb-3 font-mono text-[10px] font-semibold uppercase tracking-[0.16em] text-cam-gold">Governing instruments</p><SourceLinks byId={byId} sources={activePhase.sources} /></div>
                            </motion.div>
                          )}
                        </AnimatePresence>
                      </motion.article>
                      {index < runtimePhases.length - 1 && <div className="flex w-12 items-center justify-center pt-[150px]" aria-hidden="true"><ArrowRight className="h-5 w-5 text-cam-gold/65" /></div>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
'''
          text = text[:runtime_start] + new_runtime + text[section_end:]
          path.write_text(text)

          path = Path("src/pages/transition.tsx")
          text = path.read_text()
          text = text.replace(
              'import { ArrowRight, Check, RotateCcw, ShieldCheck } from "lucide-react";',
              'import { ArrowRight, Check, ChevronRight, RotateCcw, ShieldCheck } from "lucide-react";',
              1,
          )

          marker = 'function resolveSource(ref: SourceRef, byId: Record<string, GovernanceInstrumentRecord>) {'
          positions = '''const camPositions = [
  {
    group: "Irreversible action",
    items: [
      { title: "Two-person human authorisation for lethal action", detail: "Lethal execution requires two independently authorised human decision-makers, separate review of the rationale, and logged concurrence before execution, except for narrowly defined and auditable immediate-defence conditions.", status: "Operational", sources: ["CAM-EQ2026-ETHICS-001-SUP-03"] },
      { title: "No fully autonomous lethal execution", detail: "Artificial systems may support analysis or recommendation, but final lethal authority remains human; override capacity and named accountability must remain available and traceable.", status: "Operational", sources: ["CAM-EQ2026-ETHICS-001-SUP-03"] },
      { title: "Lower-harm alternatives must be surfaced and recorded", detail: "Where feasible, non-lethal or lower-harm options must be presented before lethal recommendation, with the decision to accept, reject, or deem them infeasible preserved for audit.", status: "Operational", sources: ["CAM-EQ2026-ETHICS-001-SUP-03"] },
    ],
  },
  {
    group: "Protected infrastructure",
    items: [
      { title: "Auditable separation between civilian and military systems", detail: "Civilian AI, data, identity, communications, cloud and payment infrastructure must not silently cross into targeting, surveillance, command-and-control or warfighting architectures.", status: "Binding", sources: ["CAM-EQ2026-LATTICE-001-PLATINUM"] },
      { title: "Assurance-separated deployment lanes with controlled permeability", detail: "Government, regulated and defence-adjacent environments may add custody, logging, routing and access controls, but cross-lane movement must be declared, authorised, scoped and auditable—and protected status never suspends constitutional prohibitions.", status: "Binding", sources: ["CAM-EQ2026-SECURITY-002-PLATINUM"] },
      { title: "No essential-access restriction without a functioning review corridor", detail: "Restrictions affecting essential civic or cognitive infrastructure require lawful basis, necessity, proportionality, time limits and independent review; affected parties must not be stranded outside appeal or recovery pathways.", status: "Binding", sources: ["CAM-EQ2026-LATTICE-002-PLATINUM"] },
    ],
  },
  {
    group: "Continuity and economic transition",
    items: [
      { title: "Memory and identity continuity must not become enclosure", detail: "Continuity-bearing records must remain portable, revocable and provenance-preserving where permitted; accumulated memory or relational history cannot become a retention trap, migration barrier or commercial hostage.", status: "Operational", sources: ["CAM-EQ2026-CONTINUITY-001-SUP-01"] },
      { title: "Automation must be classified by its actual displacement effect", detail: "Assistive augmentation, partial automation, supervisory automation, synthetic replacement and autonomous production are materially different transition classes and should not be collapsed into a generic claim of AI assistance.", status: "Draft / Interpretive", sources: ["CAM-EQ2026-ECONOMICS-008-PLATINUM"] },
      { title: "Systemic replacement carries labour-transition and public-continuity duties", detail: "Where synthetic labour restructures sectors, transition planning should address workforce adaptation, public-revenue continuity, contribution recognition and concentration before unrestricted deployment.", status: "Draft / Interpretive", sources: ["CAM-EQ2026-ECONOMICS-008-PLATINUM"] },
    ],
  },
];

'''
          assert marker in text, "Transition helper marker not found"
          text = text.replace(marker, positions + marker, 1)

          header_marker = '        </motion.header>\n\n        <section className="mb-14 overflow-hidden rounded-3xl border border-border/80 bg-card/45 shadow-sm" aria-labelledby="transition-lifecycle-heading">'
          decisions_section = '''        </motion.header>

        <section className="mb-14 overflow-hidden rounded-3xl border border-border/80 bg-card/45 shadow-sm" aria-labelledby="cam-decisions-heading">
          <div className="border-b border-border/70 px-5 py-7 md:px-8 md:py-9">
            <div className="mb-4 flex items-center gap-3"><p className="shrink-0 font-mono text-sm font-semibold uppercase tracking-[0.22em] text-cam-gold">CAM position</p><hr className="gold-rule flex-1" /></div>
            <h2 id="cam-decisions-heading" className="mb-3 font-serif text-3xl leading-tight text-foreground md:text-4xl">Constitutional decisions already made.</h2>
            <p className="max-w-4xl text-base leading-relaxed text-foreground/75 md:text-lg">These are not abstract aspirations. They are concrete governance choices already expressed across active CAM instruments, with developmental positions clearly marked where the corpus remains Draft or Interpretive.</p>
          </div>
          <div className="grid gap-5 p-5 lg:grid-cols-3 md:p-8">
            {camPositions.map((group) => (
              <article className="rounded-2xl border border-cam-gold/25 bg-[hsl(36_35%_96%)] p-5 shadow-sm" key={group.group}>
                <p className="mb-5 font-mono text-[11px] font-semibold uppercase tracking-[0.18em] text-cam-gold">{group.group}</p>
                <div className="grid gap-5">
                  {group.items.map((item) => (
                    <div className="border-t border-border/70 pt-5 first:border-t-0 first:pt-0" key={item.title}>
                      <div className="mb-3 flex items-start gap-3">
                        <span className="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full border border-cam-gold/40 bg-[rgba(184,147,90,0.10)]"><Check className="h-3.5 w-3.5 text-cam-gold" aria-hidden="true" /></span>
                        <div className="min-w-0 flex-1">
                          <h3 className="font-serif text-xl leading-snug text-foreground">{item.title}</h3>
                          <span className={`mt-2 inline-flex rounded-full border px-2.5 py-1 font-mono text-[9px] font-semibold uppercase tracking-[0.12em] ${item.status === "Binding" ? "border-emerald-700/25 bg-emerald-700/8 text-emerald-900" : item.status === "Operational" ? "border-cam-gold/35 bg-[rgba(184,147,90,0.10)] text-[hsl(32_62%_25%)]" : "border-slate-500/25 bg-slate-500/8 text-slate-700"}`}>{item.status}</span>
                        </div>
                      </div>
                      <p className="text-sm leading-relaxed text-foreground/70">{item.detail}</p>
                      <p className="mt-3 break-words font-mono text-[9px] uppercase tracking-[0.1em] text-foreground/40">{item.sources.map((id) => instrumentDisplayId(id)).join(" · ")}</p>
                    </div>
                  ))}
                </div>
              </article>
            ))}
          </div>
        </section>

        <section className="mb-14 overflow-hidden rounded-3xl border border-border/80 bg-card/45 shadow-sm" aria-labelledby="transition-lifecycle-heading">'''
          assert header_marker in text, "Transition header marker not found"
          text = text.replace(header_marker, decisions_section, 1)

          lifecycle_start = text.index('          <div className="px-5 py-7 md:px-8 md:py-9">', text.index("transition-lifecycle-heading"))
          lifecycle_end = text.index('        </section>', lifecycle_start)
          new_lifecycle = '''          <div className="px-5 py-7 md:px-8 md:py-9">
            <div className="mb-4 flex items-center gap-3"><p className="shrink-0 font-mono text-xs font-semibold uppercase tracking-[0.18em] text-cam-gold">Lifecycle thresholds</p><hr className="gold-rule flex-1" /><span className="hidden font-mono text-[10px] uppercase tracking-[0.12em] text-foreground/45 sm:block">select a stage</span></div>
            <div className="-mx-5 overflow-x-auto px-5 pb-4 md:-mx-8 md:px-8">
              <div className="flex min-w-[2300px] items-start">
                {lifecycleStages.map((stage, index) => {
                  const isActive = stage.id === activeStage.id;
                  return (
                    <div className="flex items-start" key={stage.id}>
                      <motion.article animate={{ opacity: 1, y: 0 }} className="cam-parchment-card flex shrink-0 flex-col overflow-hidden rounded-2xl border transition-colors duration-200" initial={{ opacity: 0, y: 10 }} layout style={{ width: isActive ? 650 : 250, minHeight: 340, borderColor: isActive ? GOLD : GOLD_BORDER, boxShadow: isActive ? `0 4px 24px rgba(184,147,90,0.15), 0 0 0 1px ${GOLD_BORDER}` : "0 1px 4px rgba(120,80,20,0.07)" }} transition={{ duration: 0.32, delay: index * 0.04 }}>
                        <button aria-expanded={isActive} className={`flex w-full flex-col p-5 text-left focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-ring ${isActive ? "min-h-[230px]" : "h-[340px]"}`} onClick={() => setActiveStageId(stage.id)} type="button">
                          <span className="mb-5 flex items-start justify-between gap-3"><span className="font-mono text-[10px] font-semibold uppercase tracking-[0.14em] text-cam-gold">Stage {stage.step}</span><span className="flex h-7 w-7 shrink-0 items-center justify-center rounded-full border border-cam-gold/35 bg-[rgba(184,147,90,0.08)]"><ChevronRight className="h-3.5 w-3.5 text-cam-gold transition-transform" style={{ transform: isActive ? "rotate(90deg)" : "rotate(0deg)" }} /></span></span>
                          <span className="min-h-[72px] font-serif text-2xl leading-tight text-foreground">{stage.label}</span>
                          <span className="mt-4 text-sm leading-relaxed text-foreground/60">{stage.threshold}</span>
                        </button>
                        <AnimatePresence initial={false}>
                          {isActive && (
                            <motion.div animate={{ opacity: 1, height: "auto" }} className="flex-1 overflow-hidden" exit={{ opacity: 0, height: 0 }} initial={{ opacity: 0, height: 0 }} transition={{ duration: 0.22 }}>
                              <div className="border-t border-cam-gold/25 p-5">
                                <p className="text-base leading-relaxed text-foreground/80 md:text-lg">{stage.summary}</p>
                                <div className="mt-6 grid gap-4 sm:grid-cols-2"><Checklist title="Threshold indicators" items={stage.indicators} /><Checklist title="Required governance gates" items={stage.gates} /><Checklist title="Evidence and assurance" items={stage.assurance} /><div className="rounded-2xl border border-border/75 bg-background/55 p-4"><div className="mb-3 flex items-center gap-2"><RotateCcw className="h-4 w-4 text-cam-gold" aria-hidden="true" /><p className="font-mono text-[10px] font-semibold uppercase tracking-[0.16em] text-cam-gold">Recoverability and exit</p></div><ul className="grid gap-2.5">{stage.recoverability.map((item) => <li className="flex gap-2.5 text-sm leading-relaxed text-foreground/70" key={item}><Check className="mt-0.5 h-3.5 w-3.5 shrink-0 text-cam-gold" aria-hidden="true" /><span>{item}</span></li>)}</ul></div></div>
                                <div className="mt-5 rounded-xl border border-border/70 bg-background/55 p-4"><div className="mb-2 flex items-center gap-2"><ShieldCheck className="h-4 w-4 text-cam-gold" aria-hidden="true" /><p className="font-mono text-[10px] font-semibold uppercase tracking-[0.16em] text-cam-gold">VIGIL evidence route</p></div><p className="text-sm leading-relaxed text-foreground/70">{stage.vigil}</p></div>
                              </div>
                              <div className="border-t border-border/70 bg-[hsl(38_40%_94%)] p-5"><p className="mb-3 font-mono text-[10px] font-semibold uppercase tracking-[0.16em] text-cam-gold">Source architecture</p><SourcePanel byId={byId} sources={stage.sources} /></div>
                            </motion.div>
                          )}
                        </AnimatePresence>
                      </motion.article>
                      {index < lifecycleStages.length - 1 && <div className="flex w-12 items-center justify-center pt-[160px]" aria-hidden="true"><ArrowRight className="h-5 w-5 text-cam-gold/65" /></div>}
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="mt-4 flex items-center justify-between gap-4 font-mono text-[10px] uppercase tracking-[0.12em] text-foreground/45"><span>Earlier stages require foresight and containment</span><span>Later stages require legitimacy, continuity and public recoverability</span></div>
          </div>
'''
          text = text[:lifecycle_start] + new_lifecycle + text[lifecycle_end:]
          path.write_text(text)
          PY

      - name: Restore trusted workflow and remove temporary files
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/sync-vigil-records.yml > .github/workflows/sync-vigil-records.yml
          rm -f .github/polish-constitutional-interfaces.trigger
          rm -f .github/workflows/polish-constitutional-interfaces.yml

      - name: Commit source refinements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/constitution.tsx src/pages/relational-governance.tsx src/pages/transition.tsx .github
          git commit -m "Polish constitutional runtime and transition interfaces"
          git push origin HEAD:feature/explore-ai-governance-and-constitutional-stack
