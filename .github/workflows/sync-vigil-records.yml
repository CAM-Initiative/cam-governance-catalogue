name: Sync VIGIL records

on:
  push:
    branches:
      - codex/add-vigil-reporting-page-and-privacy-policy
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  repository_dispatch:
    types: [vigil-records-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync VIGIL generated registers
        run: pnpm run sync:vigil
        env:
          VIGIL_SYNC_STRICT: "1"

      - name: Build CAM interface for GitHub Pages
        run: pnpm run deploy:docs

      - name: Validate catalogue
        run: pnpm run validate:catalogue

      - name: Validate VIGIL
        run: pnpm run validate:vigil

      - name: Test VIGIL
        run: pnpm run test:vigil

      - name: Restore canonical workflow and commit build
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/sync-vigil-records.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs .github/workflows/sync-vigil-records.yml
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Rebuild site after consolidating governance presentation"
          git push origin HEAD:codex/add-vigil-reporting-page-and-privacy-policy
