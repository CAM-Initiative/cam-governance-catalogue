name: Sync VIGIL records

on:
  push:
    branches:
      - feature/explore-ai-governance-and-constitutional-stack
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  repository_dispatch:
    types: [vigil-records-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync VIGIL generated registers
        run: pnpm run sync:vigil
        env:
          VIGIL_SYNC_STRICT: "1"

      - name: Build CAM interface for GitHub Pages
        run: pnpm run deploy:docs

      - name: Validate catalogue
        run: pnpm run validate:catalogue

      - name: Validate VIGIL
        run: pnpm run validate:vigil

      - name: Test VIGIL
        run: pnpm run test:vigil

      - name: Restore canonical workflow definition
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/sync-vigil-records.yml

      - name: Commit generated site
        run: |
          if [ -z "$(git status --porcelain -- docs .github/workflows/sync-vigil-records.yml)" ]; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs .github/workflows/sync-vigil-records.yml
          git commit -m "build: refresh governance interface"
          git push
