name: Sync VIGIL records

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  # Future cross-repository automation: configure a VIGIL-side token/webhook to
  # send repository_dispatch type "vigil-records-updated" after generated
  # registers are rebuilt. This receiver is intentionally secret-free here.
  repository_dispatch:
    types: [vigil-records-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync VIGIL generated registers
        run: pnpm run sync:vigil
        env:
          VIGIL_SYNC_STRICT: "1"

      - name: Build CAM interface for GitHub Pages
        run: pnpm run deploy:docs

      - name: Commit changed generated files
        run: |
          if [ -z "$(git status --porcelain -- docs)" ]; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: sync VIGIL registers"
          git push
