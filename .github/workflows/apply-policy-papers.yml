name: Apply Policy Papers branch update

on:
  push:
    branches:
      - feature/policy-papers

permissions:
  contents: write

jobs:
  apply-policy-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Check out policy branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Apply source changes
        run: node scripts/run-policy-papers-update.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check source
        run: pnpm exec tsc --noEmit

      - name: Build GitHub Pages output
        run: |
          rm -rf docs/assets
          pnpm exec vite build
          node scripts/prepare-github-pages.js

      - name: Remove temporary update machinery
        run: |
          rm -f scripts/apply-policy-papers.mjs
          rm -f scripts/run-policy-papers-update.mjs
          rm -f scripts/.apply-policy-papers-generated.mjs
          rm -f .github/workflows/apply-policy-papers.yml

      - name: Commit completed website update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Policy Papers section"
          git push
